[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dikw-converter-example"
version = "0.0.1"
description = "Reference stub converter for ``.example`` files. Copy as the template for a real converter plugin (PDF, EPUB, …)."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "dikw-plugins contributors" }]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "dikw-core>=0.5.3",
]

# Register this plugin with dikw client's converter discovery.
# The key (``example``) is informational; ``ExampleConverter.name`` is
# what dispatch actually uses.
[project.entry-points."dikw.client.converters"]
example = "dikw_converter_example:ExampleConverter"

[project.urls]
Repository = "https://github.com/opendikw/dikw-plugins"

[tool.hatch.build.targets.wheel]
packages = ["src/dikw_converter_example"]
