[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dikw-converter-mineru"
version = "0.1.0"
description = "MinerU online-API converter plugin for dikw client import — PDF + DOCX + PPTX + XLSX → markdown."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "dikw-plugins contributors" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "dikw-core>=0.0.1",
    "httpx>=0.27",
]

# Register this plugin with dikw client's converter discovery.
# The key (``mineru``) is informational; ``MineruConverter.name`` is
# what dispatch actually uses.
[project.entry-points."dikw.client.converters"]
mineru = "dikw_converter_mineru:MineruConverter"

[project.urls]
Repository = "https://github.com/opendikw/dikw-plugins"

[tool.hatch.build.targets.wheel]
packages = ["src/dikw_converter_mineru"]

[dependency-groups]
dev = [
    "pytest-httpx>=0.30",
]
