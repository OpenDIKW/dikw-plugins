name: ci

on:
  push:
    branches: [main]
  pull_request:

# Layout in the runner workspace:
#   $GITHUB_WORKSPACE/dikw-plugins/   <- this repo
#   $GITHUB_WORKSPACE/dikw-core/      <- sibling, sourced by tool.uv.sources
#
# This matches the local-dev sibling layout (opendikw/dikw-plugins +
# opendikw/dikw-core) so ``tool.uv.sources = { path = "../dikw-core" }``
# resolves the same way in CI as on a developer machine.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout dikw-plugins
        uses: actions/checkout@v4
        with:
          path: dikw-plugins

      - name: Checkout dikw-core (sibling)
        uses: actions/checkout@v4
        with:
          repository: opendikw/dikw-core
          path: dikw-core
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync workspace
        working-directory: dikw-plugins
        # --all-packages installs every workspace member (editable) so
        # their declared deps (e.g. mineru's httpx) land in the env.
        # Without it, uv only syncs the workspace root's own deps.
        run: uv sync --all-packages --all-extras

      - name: Lint (ruff)
        working-directory: dikw-plugins
        run: uv run ruff check .

      - name: Type-check (mypy)
        working-directory: dikw-plugins
        run: uv run mypy packages/*/src

      - name: Test
        working-directory: dikw-plugins
        run: uv run pytest -v
