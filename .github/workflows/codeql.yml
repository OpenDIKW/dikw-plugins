name: codeql

# CodeQL static analysis for Python. Runs on every push to main and
# every PR, plus a weekly cron so newly-published query updates pick
# up issues in code that hasn't otherwise changed.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mondays 06:00 UTC — same day as Dependabot, so weekly noise
    # arrives in one batch.
    - cron: "0 6 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
